services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trakit-app
    environment:
      SQLITE_DB_PATH: /app/data/trakit.db
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@example.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Trakit <noreply@example.com>}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      NOTIFICATION_ENCRYPTION_KEY: ${NOTIFICATION_ENCRYPTION_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-noreply@yourdomain.com}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      NODE_ENV: production
    volumes:
      - trakit_data:/app/data
    networks:
      - trakit-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: trakit-caddy
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - app
    networks:
      - trakit-network
    restart: unless-stopped

volumes:
  trakit_data:
  caddy_data:
  caddy_config:

networks:
  trakit-network:
    driver: bridge
